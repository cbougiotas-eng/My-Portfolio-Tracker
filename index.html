<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Portfolio Tracker</title>
<!-- iOS home screen app behaviour -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Portfolio"/>
<meta name="theme-color" content="#0d0d1a"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#09091a;color:#e8e8f0;font-family:'Segoe UI',system-ui,sans-serif;max-width:480px;margin:0 auto;padding-bottom:calc(90px + env(safe-area-inset-bottom));padding-top:env(safe-area-inset-top);min-height:100vh}
button{cursor:pointer;font-family:inherit}input,select{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{opacity:.4}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
select option{background:#0d0d1a;color:#fff}

/* ── Desktop layout ──────────────────────────────────────────────── */
@media(min-width:900px){
  body{max-width:100%;margin:0;padding:0;height:100vh;overflow:hidden;background:#080810}

  /* Fixed sidebar nav */
  #tabs{display:flex;flex-direction:column;background:#09091a;border-right:1px solid #161628;border-bottom:none;position:fixed;top:0;left:0;width:220px;height:100vh;padding:0;justify-content:flex-start;gap:2px;z-index:20;overflow-y:auto}
  #tabs::before{content:'📊 Portfolio';display:block;padding:24px 20px 18px;font-size:15px;font-weight:700;color:#fff;border-bottom:1px solid #161628;margin-bottom:6px;letter-spacing:.3px;flex-shrink:0}
  .tab-btn{padding:11px 20px;text-align:left;font-size:16px;letter-spacing:.4px;border-bottom:none;border-left:3px solid transparent;border-radius:0;display:flex;align-items:center;gap:10px;width:100%}
  .tab-btn.active{border-bottom-color:transparent;border-left-color:#7B68EE;background:#13132a;color:#fff}
  .tab-btn.active.warn-tab{border-left-color:#ff4444}

  /* Fixed top header bar */
  #header{position:fixed;top:0;left:220px;right:0;z-index:15;padding:0 28px;height:64px;display:flex;align-items:center;gap:20px;background:#09091a;border-bottom:1px solid #161628}
  #header-top{display:contents}
  #total-label{display:none}
  #total-value{font-size:22px;white-space:nowrap;flex-shrink:0}
  #header-sub{margin-top:0;gap:8px;flex-shrink:0}
  #last-updated{display:none}
  #header-stats{margin-top:0;gap:8px;flex-shrink:0}
  .stat-box{padding:5px 12px;min-width:68px;border-radius:8px}
  .stat-label{font-size:8px}
  .stat-val{font-size:12px}
  #acct-split{margin-top:0;gap:8px;flex-shrink:0}
  .acct-pill{padding:5px 12px;border-radius:8px}
  .ap-label{font-size:8px}
  .ap-val{font-size:12px}
  .ap-pct{font-size:9px}
  #mode-pill{flex-shrink:0;margin-left:auto}

  /* Scrollable main content */
  #main-content{position:fixed;top:64px;left:220px;right:0;bottom:0;overflow-y:auto}

  /* Panels */
  .panel{padding:24px 28px;max-width:none}
  #chart-panel{padding:24px 28px}

  /* All 3 charts side by side */
  #chart-swipe-wrap{overflow:visible!important}
  #chart-swipe-inner{display:grid!important;grid-template-columns:repeat(3,1fr)!important;gap:16px!important;width:100%!important;transform:none!important;transition:none!important}
  #chart-swipe-inner>div{width:100%!important;flex-shrink:unset!important}
  .chart-dot{display:none}
  #chart-title{display:none}

  /* Holdings 2-col */
  #holdings-list{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  #holdings-list .card{margin-bottom:0!important}

  /* Warnings 2-col */
  #warnings-content{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start}
  #warnings-content .warn-card{margin-bottom:0}
  #warnings-content .section-label{grid-column:1/-1}

  /* Settings */
  .setting-input{width:80px}
  #target-inputs{display:grid;grid-template-columns:1fr 1fr;gap:0 20px}

  /* Sectors */
  #other-sectors-list{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  #other-sectors-list .sector-row{margin-bottom:0}

  /* FAB */
  #fab{bottom:28px;right:28px;width:56px;height:56px;font-size:24px}

  /* Modal centered */
  .overlay{align-items:center;justify-content:center}
  .sheet{border-radius:16px;max-width:500px;max-height:88vh}

  /* Misc */
  #offline-banner{margin-left:220px}
  #undo-toast{bottom:36px}
  #search-input{font-size:13px;padding:9px 13px}
  #chart-swipe-wrap{touch-action:auto!important}
#fab:hover{transform:scale(1.07);box-shadow:0 6px 28px rgba(123,104,238,.75)}
#fab:active{transform:scale(0.96)}
.field input:focus,.field select:focus{outline:none;border-color:#7B68EE88}
.btn-sm:active{opacity:.75}
.btn-cancel:active{background:#181828}
.btn-save:active{opacity:.88}
.card:active{background:#13132a}

  .tab-btn.active:hover{background:#13132a}
  .card{transition:border-color .15s,background .15s}
  .card:hover{border-color:#2e2e4e;background:#16162a}
  .btn-edit:hover{background:#2a2a50}
  .btn-dup:hover{background:#0d2a2a}
  .btn-del:hover{background:#3a1530}
  .btn-sm:hover{background:#252545;border-color:#444}
  .acct-pill:hover{opacity:.85}
  .stat-box:hover{background:#1a2a4a}
  /* Slightly wider sidebar on hover expand feel */
  .tab-btn{transition:background .15s,color .15s}
  /* Better scrollbar on desktop content */
  #main-content::-webkit-scrollbar{width:6px}
  #main-content::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:3px}
  #main-content::-webkit-scrollbar-track{background:transparent}
  /* Chart labels on desktop */
  #chart-swipe-inner>div>div:first-child{display:flex;flex-direction:column;align-items:center}
  /* Section titles for each chart on desktop */
  .desktop-chart-title{display:block}
  .sector-row{margin-bottom:0}
  .metals-row{margin-bottom:0}
}
#header{background:linear-gradient(160deg,#12122a,#0d0d1a);padding:20px 18px 16px;border-bottom:1px solid #1a1a30}
#header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
#total-label{font-size:12px;letter-spacing:3px;color:#888;text-transform:uppercase}
#total-value{font-size:29px;font-weight:700;color:#fff;line-height:1.1}
#total-value span{font-size:15px;color:#888;font-weight:400}
#header-sub{display:flex;gap:14px;margin-top:3px;font-size:13px;flex-wrap:wrap}
#last-updated{font-size:10px;color:#555;margin-top:3px}
#mode-pill{display:flex;background:#0f0f22;border:1px solid #1e1e35;border-radius:22px;padding:3px;gap:2px;flex-shrink:0}
#mode-pill button{padding:5px 11px;border-radius:18px;border:none;font-size:10px;color:#555;background:transparent;transition:all .15s}
#mode-pill button.active-risk{background:#ff4444;color:#fff;font-weight:700}
#mode-pill button.active-market{background:#7B68EE;color:#fff;font-weight:700}
#header-stats{display:flex;gap:7px;margin-top:11px}
.stat-box{background:#13192e;border:1px solid #1e2540;border-radius:10px;padding:6px 0;flex:1;text-align:center}
.stat-label{font-size:11px;color:#888}
.stat-val{font-weight:700;font-size:16px}
#acct-split{display:flex;gap:8px;margin-top:10px}
.acct-pill{flex:1;border-radius:11px;padding:9px 10px;text-align:center;border:1px solid transparent;cursor:pointer;transition:opacity .15s}
.acct-pill.long{background:#0a1a28;border-color:#1a3a55}
.acct-pill.trade{background:#150a25;border-color:#32185a}
.acct-pill .ap-label{font-size:11px;color:#888;letter-spacing:1px;text-transform:uppercase}
.acct-pill .ap-val{font-size:16px;font-weight:700;margin-top:1px}
.acct-pill .ap-pct{font-size:12px;margin-top:1px}
.acct-pill.long .ap-val{color:#4A90D9}
.acct-pill.trade .ap-val{color:#F7931A}
#tabs{display:flex;background:#0a0a18;border-bottom:1px solid #1a1a2e;position:sticky;top:0;z-index:10}
.tab-btn{flex:1;padding:12px 0;background:none;border:none;color:#555;font-size:9px;font-weight:500;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.5px;transition:color .15s}
.tab-btn.active{color:#fff;font-weight:700;border-bottom-color:#7B68EE}
.tab-label{display:none}
@media(min-width:900px){.tab-label{display:inline}}
.tab-btn.active.warn-tab{border-bottom-color:#ff4444}
.warn-badge{background:#ff4444;color:#fff;border-radius:50%;font-size:9px;padding:1px 4px;margin-left:4px;display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px}
#acct-tabs{display:flex;gap:6px;margin-bottom:10px}
.acct-tab{flex:1;padding:9px 0;border-radius:10px;border:1px solid #1a1a2e;background:#0e0e1e;font-size:12px;color:#555;font-weight:400;transition:all .15s}
.acct-tab.active-long{border-color:#1a4060;background:#0d1f2d;color:#4A90D9;font-weight:700}
.acct-tab.active-trade{border-color:#3a1a60;background:#1a0d2e;color:#F7931A;font-weight:700}
.acct-tab.active-all{border-color:#333;background:#1e1e2e;color:#fff;font-weight:700}
.panel{padding:13px 15px;display:none}
.panel.active{display:block}
#chart-panel{padding:14px 15px}
.card{border-radius:12px;margin-bottom:6px;padding:11px 13px;border:1px solid #1c1c2e;background:#111220;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.card.warn{background:#1f0a0a;border-color:#ff4444}
.card.no-stop{border-color:#3a2a00}
.card.long-card{border-left:3px solid #1a4060}
.card.trade-card{border-left:3px solid #3a1a60}
.row{display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.name:hover{white-space:normal;overflow:visible}
.sub{font-size:12px;color:#666;margin-top:1px}
.pct{font-size:14px;font-weight:700}
.val{font-size:12px;color:#666}
.actions{display:flex;gap:4px;flex-shrink:0}
.btn-edit{background:#16163a;border:1px solid #2a2a50;border-radius:7px;color:#7B68EE;padding:5px 8px;font-size:13px}
.btn-dup{background:#0d1a1a;border:1px solid #1a3a3a;border-radius:7px;color:#3DD68C;padding:5px 8px;font-size:13px}
.btn-del{background:#1e0a18;border:1px solid #3a1030;border-radius:7px;color:#ff6b6b;padding:5px 8px;font-size:13px}
.acct-tag{font-size:11px;padding:1px 6px;border-radius:8px;font-weight:700;flex-shrink:0}
.acct-tag.long{background:#0d1f2d;color:#4A90D9;border:1px solid #1a4060}
.acct-tag.trade{background:#1a0d2e;color:#F7931A;border:1px solid #3a1a60}
.fresh-dot{width:6px;height:6px;border-radius:50%;background:#5BA85B;display:inline-block;margin-left:4px;flex-shrink:0}
.stale-dot{width:6px;height:6px;border-radius:50%;background:#888;display:inline-block;margin-left:4px;flex-shrink:0}
.sector-row{display:flex;align-items:center;gap:10px;padding:10px 13px;margin-bottom:6px;border-radius:12px;cursor:pointer;border:1px solid #1c1c2e;background:#111220;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.sector-row.warn{background:#1f0a0a;border-color:#ff4444}
.sector-row.sel{background:#1e1e3a}
.sector-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sector-name{flex:1;font-size:14px}
.sector-pct{font-weight:700;font-size:14px}
.sector-kr{font-size:12px;color:#666}
.metals-group{background:#1a1608;border:1px solid #3a3000;border-radius:12px;padding:12px;margin-bottom:9px}
.metals-title{font-weight:700;color:#FFD700;margin-bottom:8px;font-size:13px;letter-spacing:1px}
.metals-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #2a2200;font-size:14px}
.csv-box{background:#0e0e1e;border:1px dashed #252535;border-radius:12px;padding:11px 14px;margin-bottom:10px;text-align:center}
.csv-box p{font-size:13px;color:#666;margin-bottom:6px}
.csv-btns{display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
.btn-sm{border:1px solid #252535;border-radius:8px;padding:7px 12px;font-size:13px;background:#141428;color:#aaa;transition:background .15s,border-color .15s}
.filter-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;background:#1e1e3a;border-radius:10px;padding:6px 12px}
.filter-bar span{font-size:13px;color:#aaa}
.btn-clear{background:none;border:none;color:#7B68EE;font-size:13px}
#search-sort{display:flex;gap:7px;margin-bottom:9px}
#search-input{flex:1;background:#0e0e1e;border:1px solid #222235;border-radius:10px;padding:9px 12px;color:#fff;font-size:14px}
#search-input::placeholder{color:#444}
#sort-select{background:#0e0e1e;border:1px solid #222235;border-radius:10px;padding:9px 10px;color:#aaa;font-size:13px;width:auto}
.warn-card{background:#1a0808;border:1px solid #ff444433;border-radius:12px;padding:11px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(255,68,68,.08)}
.warn-row{display:flex;justify-content:space-between;align-items:flex-start}
.warn-pct{color:#ff4444;font-weight:700;font-size:16px}
.warn-excess{font-size:12px;color:#ff7777}
.warn-bar-bg{margin-top:8px;background:#2a0808;border-radius:5px;height:4px;overflow:hidden}
.warn-bar-fill{height:100%;border-radius:5px}
.warn-bar-labels{display:flex;justify-content:space-between;margin-top:3px;font-size:11px;color:#666}
.section-label{font-size:11px;letter-spacing:2px;color:#888;text-transform:uppercase;margin-bottom:8px;margin-top:13px}
.settings-card{background:#111220;border:1px solid #1c1c2e;border-radius:14px;padding:15px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.settings-card-title{font-size:13px;font-weight:700;color:#e8e8f0;margin-bottom:13px;letter-spacing:.2px}

.setting-label{font-size:14px}
.setting-sub{font-size:12px;color:#666;margin-top:2px}
.setting-input{background:#0d0d1a;border:1px solid #333;border-radius:7px;padding:5px 9px;color:#fff;font-size:12px;width:64px;text-align:center}
#fab{position:fixed;bottom:22px;right:20px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#8B7CF8,#4A90D9);border:none;color:#fff;font-size:24px;box-shadow:0 4px 24px rgba(123,104,238,.6);z-index:100;transition:transform .15s,box-shadow .15s}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:#13132a;border-radius:22px 22px 0 0;padding:22px 18px calc(16px + env(safe-area-inset-bottom));width:100%;max-height:85vh;overflow-y:auto;border-top:1px solid #2a2a40}
/* Ensure date input native picker has room — push sheet up when date focused */
.sheet input[type=date]:focus{position:relative;z-index:1}
.sheet h2{font-size:17px;font-weight:700;margin-bottom:16px;color:#fff}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.field input,.field select{width:100%;background:#0a0a18;border:1px solid #252535;border-radius:10px;padding:11px 13px;color:#fff;font-size:13px;transition:border-color .15s}
.modal-btns{display:flex;gap:8px;margin-top:12px}
.btn-cancel{flex:1;padding:13px;background:#0e0e1e;border:1px solid #252535;border-radius:12px;color:#666;font-size:13px;transition:background .15s}
.btn-save{flex:2;padding:13px;background:linear-gradient(135deg,#8B7CF8,#4A90D9);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;box-shadow:0 2px 12px rgba(123,104,238,.35);transition:opacity .15s}
#risk-preview{background:#111;border-radius:9px;padding:10px 12px;margin:5px 0;display:none}
#risk-preview .rp-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
#risk-preview .rp-divider{border-top:1px solid #222;margin:6px 0}
#risk-preview .rp-main{display:flex;justify-content:space-between;font-size:14px}
#f-account-wrap{display:flex;gap:7px;margin-bottom:10px}
.acct-sel-btn{flex:1;padding:10px;border-radius:9px;border:1px solid #333;background:#0d0d1a;font-size:12px;color:#666;font-weight:400}
.acct-sel-btn.sel-long{border-color:#1a4060;background:#0d1f2d;color:#4A90D9;font-weight:700}
.acct-sel-btn.sel-trade{border-color:#3a1a60;background:#1a0d2e;color:#F7931A;font-weight:700}
.all-ok{text-align:center;padding:40px 0}
.all-ok .ok-icon{font-size:36px;margin-bottom:9px}
.all-ok h3{font-size:14px;font-weight:700;color:#5BA85B}
.all-ok p{font-size:11px;margin-top:4px;color:#555}
.chart-dot{width:7px;height:7px;border-radius:50%;background:#333;cursor:pointer;transition:background .2s}
.chart-dot.active-dot{background:#7B68EE}
.desktop-chart-title{display:none}
#offline-banner{display:none;background:#2a1000;border-bottom:1px solid #aa6600;padding:6px 16px;font-size:13px;color:#ffaa00;text-align:center}
.target-bar-wrap{margin-top:6px}
.target-bar-track{background:#1a1a2e;border-radius:4px;height:6px;position:relative;overflow:visible}
.target-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.target-bar-marker{position:absolute;top:-3px;width:2px;height:12px;background:#fff;border-radius:1px;opacity:.7}
.target-drift-label{font-size:11px;margin-top:3px;display:flex;justify-content:space-between}
.goal-card{background:#111220;border:1px solid #1c1c2e;border-radius:15px;padding:17px;margin-bottom:11px;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.goal-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.goal-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.goal-title{font-size:15px;font-weight:700;color:#e8e8f0;margin-bottom:2px}
.goal-sub{font-size:12px;color:#666}
.goal-progress-track{background:#1a1a2e;border-radius:6px;height:8px;overflow:hidden;margin:10px 0 6px}
.goal-progress-fill{height:100%;border-radius:6px;transition:width .4s ease}
.goal-stats{display:flex;justify-content:space-between;font-size:12px;color:#666}
.goal-stat-val{font-size:15px;font-weight:700;color:#e8e8f0}
.goal-stat-label{font-size:11px;color:#666;margin-top:1px}
.goal-edit-btn{background:#1e1e2e;border:1px solid #2e2e4e;border-radius:8px;color:#7B68EE;padding:5px 10px;font-size:13px}
.goal-section-title{font-size:11px;letter-spacing:2px;color:#555;text-transform:uppercase;margin:18px 0 10px;font-weight:600}
.deposit-schedule{display:flex;align-items:center;gap:10px;background:#0d0d1a;border:1px solid #2a2a3a;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.deposit-amount{font-size:24px;font-weight:700;color:#3DD68C}
.deposit-day{font-size:13px;color:#666;margin-top:2px}
#welcome-screen{background:#09091a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center}
#app-root{display:none}
.welcome-logo{font-size:52px;margin-bottom:4px}
.welcome-title{font-size:26px;font-weight:800;color:#fff;margin-bottom:6px;letter-spacing:-.3px}
.welcome-sub{font-size:14px;color:#555;margin-bottom:36px;line-height:1.6;max-width:320px}
.welcome-btn{width:100%;max-width:340px;padding:15px;border-radius:14px;font-size:15px;font-weight:700;border:none;margin-bottom:10px;cursor:pointer;transition:opacity .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:10px}
.welcome-btn:active{transform:scale(0.97);opacity:.85}
.welcome-btn-google{background:#fff;color:#222}
.welcome-btn-guest{background:#111228;color:#aaa;border:1px solid #1e1e35;font-size:13px;padding:13px}
.welcome-features{display:flex;gap:10px;margin-bottom:32px;flex-wrap:wrap;justify-content:center;max-width:340px}
.welcome-feature{background:#111228;border:1px solid #1a1a30;border-radius:10px;padding:9px 12px;font-size:11px;color:#888;display:flex;align-items:center;gap:5px}
.welcome-guest-note{font-size:11px;color:#444;max-width:300px;line-height:1.5;margin-top:4px}

</head>
<body>

<!-- Welcome / Onboarding Screen — always shown on load, dismissed by Firebase auth or user choice -->
<div id="welcome-screen" style="display:flex;opacity:1">
  <div class="welcome-logo">📊</div>
  <div class="welcome-title">Portfolio Tracker</div>
  <div class="welcome-sub">Track your investments, manage risk, and sync across all your devices.</div>

  <div class="welcome-features">
    <div class="welcome-feature">📈 Live prices</div>
    <div class="welcome-feature">⚡ Risk mode</div>
    <div class="welcome-feature">☁️ Cloud sync</div>
    <div class="welcome-feature">🛑 Stop losses</div>
    <div class="welcome-feature">🌍 SEK / USD</div>

<div id="app-root">
<div id="offline-banner">⚠️ You're offline — prices won't refresh until connection is restored</div>
<div id="undo-toast"><span id="undo-msg"></span><button onclick="undoDelete()">Undo</button></div>

<div id="header">
  <div id="header-top">
    <div>
      <div id="total-label">Portfolio Tracker</div>
      <div id="total-value">0 <span>SEK</span></div>
      <div id="header-sub">
        <span id="total-pnl" style="display:none"></span>
        <span id="total-pct-chg" style="display:none"></span>
        <span id="total-risk-kr" style="display:none;color:#ff6666"></span>
      </div>
      <div id="last-updated"></div>
    </div>
    <div id="mode-pill">
      <button id="btn-risk" onclick="setMode('risk')">⚡ Risk</button>
      <button id="btn-market" onclick="setMode('market')">📊 Market</button>
    </div>
    <div id="currency-pill" onclick="toggleDisplayCurrency()" title="Toggle display currency" style="display:flex;background:#0f0f22;border:1px solid #1e1e35;border-radius:22px;padding:4px 12px;cursor:pointer;font-size:11px;font-weight:700;color:#aaa;align-items:center;gap:5px;flex-shrink:0;margin-left:6px">
      <span id="currency-pill-label">SEK</span>
    </div>
  </div>
  <div id="header-stats">
    <div class="stat-box"><div class="stat-label">Holdings</div><div class="stat-val" id="stat-holdings">0</div></div>
    <div class="stat-box"><div class="stat-label">Invested</div><div class="stat-val" id="stat-invested" style="color:#7B68EE">0%</div></div>
    <div class="stat-box" onclick="openCashEditor()" style="cursor:pointer">
      <div class="stat-label">💵 Cash ✏️</div>
      <div class="stat-val" id="stat-cash" style="color:#3DD68C">0%</div>
    </div>
    <div class="stat-box"><div class="stat-label">Sectors</div><div class="stat-val" id="stat-sectors">0</div></div>
  </div>
  <div id="acct-split">
    <div class="acct-pill long" onclick="setAcctFilter('long');switchTab('holdings')">
      <div class="ap-label">📈 Long Term</div>
      <div class="ap-val" id="acct-long-val">0 kr</div>
      <div class="ap-pct" id="acct-long-pct" style="color:#4A90D9">0%</div>
    </div>
    <div class="acct-pill trade" onclick="setAcctFilter('trade');switchTab('holdings')">
      <div class="ap-label">⚡ Trading</div>
      <div class="ap-val" id="acct-trade-val">0 kr</div>
      <div class="ap-pct" id="acct-trade-pct" style="color:#F7931A">0%</div>
    </div>
  </div>
</div>

<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('chart')">📊 <span class="tab-label">Chart</span></button>
  <button class="tab-btn" onclick="switchTab('sectors')">🗂 <span class="tab-label">Sectors</span></button>
  <button class="tab-btn" onclick="switchTab('holdings')">📋 <span class="tab-label">Holdings</span></button>
  <button class="tab-btn" onclick="switchTab('goals')">🎯 <span class="tab-label">Goals</span></button>
  <button class="tab-btn" onclick="switchTab('warnings')">⚠️ <span class="tab-label">Warnings</span><span id="warn-badge" class="warn-badge" style="display:none">0</span></button>
  <button class="tab-btn" onclick="switchTab('settings')">⚙️ <span class="tab-label">Settings</span></button>
</div>

<div id="main-content">

<!-- CHART -->
<div id="chart-panel" class="panel active">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 2px">
    <div id="chart-title" style="font-size:13px;font-weight:700;color:#aaa;letter-spacing:.3px"></div>
    <div style="display:flex;gap:6px;align-items:center">
      <div class="chart-dot active-dot" onclick="goToChart(0)" title="Total"></div>
      <div class="chart-dot" onclick="goToChart(1)" title="Long Term"></div>
      <div class="chart-dot" onclick="goToChart(2)" title="Trading"></div>
    </div>
  </div>
  <div id="chart-swipe-wrap" style="overflow:hidden;touch-action:pan-y">
    <div id="chart-swipe-inner" style="display:flex;transition:transform 0.35s cubic-bezier(.4,0,.2,1);width:300%">
      <div style="width:33.333%;flex-shrink:0">
        <div style="text-align:center;font-size:11px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px" class="desktop-chart-title">🌍 Total Portfolio</div>
        <div style="position:relative;display:flex;justify-content:center">
          <svg id="donut-svg-0" viewBox="0 0 260 260" style="display:block;width:100%;max-width:260px;margin:0 auto"></svg>
        </div>
        <div id="chart-legend-0" style="margin-top:4px"></div>
      </div>
      <div style="width:33.333%;flex-shrink:0">
        <div style="text-align:center;font-size:11px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px" class="desktop-chart-title">📈 Long Term</div>
        <div style="position:relative;display:flex;justify-content:center">
          <svg id="donut-svg-1" viewBox="0 0 260 260" style="display:block;width:100%;max-width:260px;margin:0 auto"></svg>
        </div>
        <div id="chart-legend-1" style="margin-top:4px"></div>
      </div>
      <div style="width:33.333%;flex-shrink:0">
        <div style="text-align:center;font-size:11px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px" class="desktop-chart-title">⚡ Trading</div>
        <div style="position:relative;display:flex;justify-content:center">
          <svg id="donut-svg-2" viewBox="0 0 260 260" style="display:block;width:100%;max-width:260px;margin:0 auto"></svg>
        </div>
        <div id="chart-legend-2" style="margin-top:4px"></div>
      </div>
    </div>
  </div>
  <div id="donut-tooltip" style="display:none;position:fixed;background:#1a1a2e;border:1px solid #333;border-radius:9px;padding:8px 12px;pointer-events:none;z-index:999;font-size:11px;box-shadow:0 4px 20px rgba(0,0,0,.5)"></div>
</div>

<!-- SECTORS -->
<div id="sectors-panel" class="panel">
  <div style="font-size:10px;color:#666;margin-bottom:9px" id="sectors-mode-label"></div>
  <div class="metals-group" id="metals-group"><div class="metals-title">⚙️ METALS — <span id="metals-pct">0%</span></div><div id="metals-list"></div></div>
  <div id="other-sectors-list"></div>
</div>

<!-- HOLDINGS -->
<div id="holdings-panel" class="panel">
  <div id="filter-bar" class="filter-bar" style="display:none">
    <span>Filtered: <b id="filter-label" style="color:#fff"></b></span>
    <button class="btn-clear" onclick="clearFilter()">Clear ✕</button>
  </div>
  <div id="acct-tabs">
    <button class="acct-tab active-all" onclick="setAcctFilter('all')">All</button>
    <button class="acct-tab" onclick="setAcctFilter('long')">📈 Long Term</button>
    <button class="acct-tab" onclick="setAcctFilter('trade')">⚡ Trading</button>
  </div>
  <div class="csv-box">
    <p>Import Avanza CSV · manage holdings below</p>
    <div class="csv-btns">
      <button class="btn-sm" style="color:#7B68EE" onclick="document.getElementById('csv-input').click()">📂 CSV</button>
      <button class="btn-sm" style="color:#3DD68C" onclick="exportData()">💾 Export</button>
      <button class="btn-sm" style="color:#F7931A" onclick="refreshPrices()" id="btn-refresh">🔄 Prices</button>
      <button class="btn-sm" style="color:#ff4444;border-color:#3a1020;margin-left:8px" onclick="resetHoldings()">🗑 Clear all</button>
    </div>
    <input id="csv-input" type="file" accept=".csv,.json" style="display:none" onchange="handleFile(event)"/>
    <div id="csv-error" style="color:#ff6b6b;font-size:10px;margin-top:5px"></div>
    <div id="refresh-status" style="font-size:10px;margin-top:5px;display:none"></div>
  </div>
  <div id="search-sort">
    <input id="search-input" placeholder="🔍 Search..." oninput="render()"/>
    <select id="sort-select" onchange="render()">
      <option value="value">Value</option>
      <option value="pct">%</option>
      <option value="name">Name</option>
      <option value="pnl">P&L</option>
      <option value="risk">Risk</option>
      <option value="nostop">No stop</option>
    </select>
  </div>
  <div id="holdings-list"></div>
</div>

<!-- GOALS -->
<div id="goals-panel" class="panel">
  <div id="goals-content"></div>
</div>

<!-- WARNINGS -->
<div id="warnings-panel" class="panel"><div id="warnings-content"></div></div>

<!-- SETTINGS -->
<div id="settings-panel" class="panel">

  <!-- Cloud Sync -->
  <div class="settings-card">
    <div class="settings-card-title">☁️ Cloud Sync</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:12px;color:#666">Status</span>
      <div style="display:flex;align-items:center;gap:6px">
        <span id="sync-status-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#555"></span>
        <span id="sync-status-label" style="font-size:12px;color:#555">Not signed in</span>
      </div>
    </div>
    <div id="sync-signedout-ui">
      <div style="font-size:12px;color:#555;margin-bottom:12px">Sign in with Google to sync across all your devices.</div>
      <button onclick="signInWithGoogle()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:9px;background:#fff;border:none;border-radius:10px;color:#222;padding:12px 13px;font-size:13px;font-weight:600">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
        Sign in with Google
      </button>
    </div>
    <div id="sync-signedin-ui" style="display:none">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <img id="sync-user-photo" src="" width="36" height="36" style="border-radius:50%;display:none"/>
        <div>
          <div id="sync-user-name" style="font-size:13px;font-weight:600;color:#e8e8f0"></div>
          <div id="sync-user-email" style="font-size:11px;color:#666"></div>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="forceSyncNow()" style="flex:1;background:#161630;border:1px solid #252545;border-radius:9px;color:#5BA85B;padding:9px;font-size:12px">🔄 Sync now</button>
        <button onclick="signOut()" style="flex:1;background:#161630;border:1px solid #252545;border-radius:9px;color:#ff6b6b;padding:9px;font-size:12px">Sign out</button>
      </div>
    </div>
  </div>

  <!-- Warning Thresholds -->
  <div class="settings-card">
    <div class="settings-card-title">⚠️ Warning Thresholds</div>
    <div class="setting-row">
      <div><div class="setting-label">Max trade size</div><div class="setting-sub">Warn if single trade exceeds this % of trading total</div></div>
      <input class="setting-input" id="set-trade-warn" type="number" min="1" max="100" value="20" onchange="saveSettings()"/>
    </div>
    <div class="setting-row">
      <div><div class="setting-label">Max trading account size</div><div class="setting-sub">Warn if trading account exceeds this % of Long Term + Cash</div></div>
      <input class="setting-input" id="set-trade-account-max" type="number" min="1" max="100" value="20" onchange="saveSettings()"/>
    </div>
    <div class="setting-row">
      <div><div class="setting-label">Max sector size (Trading)</div><div class="setting-sub">Warn if sector exceeds this % in trading account</div></div>
      <input class="setting-input" id="set-sector-warn" type="number" min="1" max="100" value="6" onchange="saveSettings()"/>
    </div>
    <div class="setting-row" style="border-bottom:none">
      <div><div class="setting-label">Warn on missing stop loss</div><div class="setting-sub">Flag trading holdings with no stop set</div></div>
      <button id="set-nostop-btn" onclick="toggleNoStop()" style="background:#161630;border:1px solid #252545;border-radius:20px;padding:5px 14px;font-size:12px;color:#7B68EE;min-width:44px">ON</button>
    </div>
  </div>

  <!-- Portfolio Goal -->
  <div class="settings-card">
    <div class="settings-card-title">🏆 Portfolio Goal</div>
    <div id="settings-portfolio-goal"></div>
  </div>

  <!-- Target Allocations -->
  <div class="settings-card">
    <div class="settings-card-title">🎯 Target Allocations <span style="color:#555;font-size:11px;font-weight:400">— set your plan, see your drift</span></div>
    <div id="target-inputs"></div>
    <div id="target-total-row" style="display:flex;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid #1a1a2e;font-size:12px">
      <span style="color:#888">Total targets</span>
      <span id="target-total-val" style="font-weight:700">0%</span>
    </div>
  </div>

  <!-- History & Backup -->
  <div class="settings-card">
    <div class="settings-card-title">📅 Snapshot History</div>
    <div id="history-list" style="font-size:12px;color:#aaa"></div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button onclick="saveSnapshot()" style="flex:1;background:#161630;border:1px solid #252545;border-radius:9px;color:#7B68EE;padding:9px;font-size:12px">📸 Save snapshot</button>
      <button onclick="autoBackup(true)" style="flex:1;background:#161630;border:1px solid #252545;border-radius:9px;color:#3DD68C;padding:9px;font-size:12px">💾 Backup now</button>
    </div>
  </div>

  <!-- Buy Me a Coffee -->
  <div class="settings-card">
    <div class="settings-card-title">☕ Support Development</div>
    <div style="font-size:12px;color:#666;margin-bottom:12px">
      If Portfolio Tracker helps you manage your investments, consider buying me a coffee!
    </div>
    <a href="https://buymeacoffee.com/chcronlund" target="_blank"
       style="display:block;width:100%;background:linear-gradient(135deg,#FFDD00,#FFB84D);border:none;border-radius:10px;color:#222;padding:12px;font-size:13px;font-weight:700;text-align:center;text-decoration:none;box-shadow:0 2px 12px rgba(255,221,0,.3);transition:transform .15s">
      ☕ Buy Me a Coffee
    </a>
  </div>

  <div style="text-align:center;font-size:11px;color:#333;padding:12px 8px">Portfolio Tracker · data saved locally</div>
</div>

</div><!-- end #main-content -->

<button id="fab" onclick="openModal()">+</button>

<!-- Goal Editor -->
<div id="goal-overlay" class="overlay" onclick="if(event.target===this)closeGoalEditor()">
  <div class="sheet">
    <h2 id="goal-editor-title">Edit Goal</h2>
    <div id="goal-editor-body"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeGoalEditor()">Cancel</button>
      <button class="btn-save" id="goal-save-btn">Save</button>
    </div>
  </div>
</div>

<!-- Cash Editor -->
<div id="cash-overlay" class="overlay" onclick="if(event.target===this)closeCashEditor()">
  <div class="sheet">
    <h2>💵 Cash & Liquidity</h2>
    <div id="cash-current-label" style="font-size:12px;color:#888;margin-bottom:13px"></div>
    <div style="display:flex;gap:7px;margin-bottom:12px">
      <button id="cash-btn-long" onclick="setCashAccount('long')" class="acct-sel-btn sel-long">📈 Long Term</button>
      <button id="cash-btn-trade" onclick="setCashAccount('trade')" class="acct-sel-btn">⚡ Trading</button>
    </div>
    <div class="field"><label id="cash-amount-label">Amount (SEK)</label><input id="cash-input" type="number" placeholder="e.g. 50000" style="border-color:#3DD68C"/></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button onclick="closeCashEditor()" class="btn-cancel">Cancel</button>
      <button onclick="saveCash()" style="flex:2;padding:12px;background:linear-gradient(135deg,#3DD68C,#2aaa70);border:none;border-radius:11px;color:#fff;font-size:13px;font-weight:700">Save Cash</button>
    </div>
  </div>
</div>

<!-- Add/Edit Holding -->
<div id="modal-overlay" class="overlay" onclick="if(event.target===this)closeModal()">
  <div class="sheet" id="modal">
    <h2 id="modal-title">Add Holding</h2>
    <div style="font-size:10px;color:#888;margin-bottom:5px">Account</div>
    <div id="f-account-wrap">
      <button class="acct-sel-btn sel-long" onclick="selectAccount('long')">📈 Long Term</button>
      <button class="acct-sel-btn" onclick="selectAccount('trade')">⚡ Trading</button>
    </div>
    <div class="field"><label>Name</label><input id="f-name" placeholder="e.g. Boliden"/></div>
    <div class="field"><label>Ticker Symbol <span style="color:#555">— for auto price (e.g. WULF, NEM, BTC-USD)</span></label><input id="f-ticker" placeholder="e.g. WULF" style="text-transform:uppercase"/></div>
    <div class="field"><label>Sector</label><select id="f-sector"></select></div>
    <div style="display:flex;gap:7px">
      <div class="field" style="flex:1"><label>Buy Price (<span class="modal-curr-label">SEK</span>)</label><input id="f-buyprice" type="number" placeholder="320" oninput="updateRiskPreview()"/></div>
      <div class="field" style="flex:1"><label>No. of Shares</label><input id="f-shares" type="number" placeholder="10" oninput="updateRiskPreview()"/></div>
    </div>
    <div class="field"><label>Current Price (<span class="modal-curr-label">SEK</span>)</label><input id="f-price" type="number" placeholder="350" oninput="updateRiskPreview()"/></div>
    <div class="field"><label>🛑 Stop Loss Price (<span class="modal-curr-label">SEK</span>) <span style="color:#555">— optional</span></label><input id="f-stoploss" type="number" placeholder="290" oninput="updateRiskPreview()"/></div>
    <div class="field"><label>📝 Notes <span style="color:#555">— optional</span></label><input id="f-notes" placeholder="e.g. DCA position, waiting for earnings…"/></div>
    <div id="risk-preview">
      <div class="rp-row"><span style="color:#888">Market value</span><span id="prev-market" style="color:#fff;font-weight:700"></span></div>
      <div class="rp-row"><span style="color:#888">P&L vs buy price</span><span id="prev-pnl" style="font-weight:700"></span></div>
      <div class="rp-divider"></div>
      <div class="rp-main"><span style="color:#ff6666">⚡ Max risk if stop hits</span><span id="prev-risk-amt" style="color:#ff4444;font-weight:700"></span></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveHolding()" id="btn-save-lbl">Add Holding</button>
    </div>
  </div>
</div>

</div><!-- end #app-root -->

<script src="app.js"></script>
</body>
</html>
