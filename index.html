<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio Tracker</title>
<style>
body{margin:0;padding:0;background:#09091a;color:#e8e8f0;font-family:system-ui,sans-serif}
*{box-sizing:border-box}
</style>
</head>
<body>
<div id="root" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;background:#09091a">
  <div style="font-size:64px;margin-bottom:20px">📊</div>
  <h1 style="font-size:28px;font-weight:700;color:#fff;margin:0 0 16px 0">Portfolio Tracker</h1>
  <p style="font-size:16px;color:#aaa;margin:0 0 32px 0;max-width:400px">Track your investments and manage your portfolio.</p>
  <button onclick="loadApp()" style="background:linear-gradient(135deg,#8B7CF8,#4A90D9);border:none;border-radius:12px;color:#fff;padding:16px 32px;font-size:16px;font-weight:700;cursor:pointer">Open Portfolio Tracker</button>
</div>

<script>
function loadApp(){
  document.getElementById('root').innerHTML='<div style="padding:40px;text-align:center;color:#aaa"><div style="font-size:48px;margin-bottom:20px">⚠️</div><p>App content loading...</p><p style="font-size:12px;color:#666;margin-top:20px">Your full app HTML file should be here</p></div>';
}
</script>
</body>
</html>
