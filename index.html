<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d1a; color: #e8e8f0; font-family: 'DM Sans', sans-serif; }
    select option { background: #0d0d1a; color: #fff; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;
const { PieChart, Pie, Cell, Tooltip, ResponsiveContainer } = Recharts;

const LS_KEY = "portfolio_tracker_holdings";
function loadHoldings() {
  try { const s = localStorage.getItem(LS_KEY); if (s) return JSON.parse(s); } catch(e) {}
  return null;
}

const SECTOR_COLORS = {
  "Silver": "#C0C0C0", "Gold": "#FFD700", "Gold & Silver": "#DAA520",
  "Base Metals Mining": "#B87333", "Mining Equipment": "#8B7355",
  "Bonds/Fixed Income": "#4A90D9", "Semiconductors ETF": "#7B68EE",
  "Crypto/Bitcoin Mining": "#F7931A", "Index (Leverage)": "#FF6B6B",
  "Construction": "#5BA85B", "Biotech/Pharma": "#FF8FAB", "Other": "#999999",
};
const SECTOR_EMOJIS = {
  "Silver": "🥈", "Gold": "🥇", "Gold & Silver": "✨",
  "Base Metals Mining": "⛏️", "Mining Equipment": "🔧",
  "Bonds/Fixed Income": "📊", "Semiconductors ETF": "💻",
  "Crypto/Bitcoin Mining": "₿", "Index (Leverage)": "📈",
  "Construction": "🏗️", "Biotech/Pharma": "🧬", "Other": "📦",
};
const SECTOR_OPTIONS = Object.keys(SECTOR_COLORS);
const METAL_SECTORS = ["Silver", "Gold", "Gold & Silver", "Base Metals Mining", "Mining Equipment"];
const HOLDING_WARN_PCT = 2;
const SECTOR_WARN_PCT = 6;
const effectiveValue = (h) => h.stopPct != null ? h.value * (h.stopPct / 100) : h.value;

const INITIAL_HOLDINGS = [
  { id: 1,  name: "Atossa Therapeutics",        value: 53.42,    sector: "Biotech/Pharma",        stopPct: null },
  { id: 2,  name: "BULL SILVER X10 AVA 25",     value: 810.00,   sector: "Silver",                stopPct: null },
  { id: 3,  name: "Boliden",                    value: 2244.80,  sector: "Base Metals Mining",    stopPct: null },
  { id: 4,  name: "Cardiol Therapeutics",       value: 152.19,   sector: "Biotech/Pharma",        stopPct: null },
  { id: 5,  name: "Caribou Biosciences",        value: 120.95,   sector: "Biotech/Pharma",        stopPct: null },
  { id: 6,  name: "Eledon Pharmaceuticals",     value: 291.74,   sector: "Biotech/Pharma",        stopPct: null },
  { id: 7,  name: "Epiroc B",                   value: 662.40,   sector: "Mining Equipment",      stopPct: null },
  { id: 8,  name: "Equinox Gold",               value: 2002.42,  sector: "Gold",                  stopPct: null },
  { id: 9,  name: "GULD AVA",                   value: 5576.35,  sector: "Gold",                  stopPct: null },
  { id: 10, name: "Global X Silver Miners ETF", value: 4451.60,  sector: "Silver",                stopPct: null },
  { id: 11, name: "Gr Silver Mining Ltd",       value: 559.02,   sector: "Silver",                stopPct: null },
  { id: 12, name: "Hycroft Mining A",           value: 2428.30,  sector: "Gold & Silver",         stopPct: null },
  { id: 13, name: "Lundin Mining Corporation",  value: 1106.80,  sector: "Base Metals Mining",    stopPct: null },
  { id: 14, name: "MINI L DJIA LEV17",          value: 5738.00,  sector: "Index (Leverage)",      stopPct: null },
  { id: 15, name: "Minaurum Silver Inc.",        value: 506.40,   sector: "Silver",                stopPct: null },
  { id: 16, name: "Newmont",                    value: 3202.36,  sector: "Gold",                  stopPct: null },
  { id: 17, name: "SILVER AVA",                 value: 11331.60, sector: "Silver",                stopPct: null },
  { id: 18, name: "Sibanye-Stillwater ADR",     value: 1011.56,  sector: "Gold & Silver",         stopPct: null },
  { id: 19, name: "Skanska B",                  value: 3421.60,  sector: "Construction",          stopPct: null },
  { id: 20, name: "TRACK SILVER SG",            value: 5001.57,  sector: "Silver",                stopPct: null },
  { id: 21, name: "TURBO L SILVER AVA 351",     value: 3151.40,  sector: "Silver",                stopPct: null },
  { id: 22, name: "TeraWulf",                   value: 48808.25, sector: "Crypto/Bitcoin Mining",  stopPct: null },
  { id: 23, name: "VanEck Semiconductor ETF",   value: 7495.33,  sector: "Semiconductors ETF",    stopPct: null },
  { id: 24, name: "iShares Treasury Bond 20+yr",value: 12120.23, sector: "Bonds/Fixed Income",    stopPct: null },
];

function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return null;
  const sep = lines[0].includes(";") ? ";" : ",";
  const headers = lines[0].split(sep).map(h => h.trim().toLowerCase());
  const nameIdx = headers.findIndex(h => h === "namn" || h === "name");
  const valIdx  = headers.findIndex(h => h === "marknadsvärde" || h === "value" || h === "market value");
  if (nameIdx === -1 || valIdx === -1) return null;
  return lines.slice(1).map((line, i) => {
    const cols = line.split(sep);
    const rawVal = (cols[valIdx] || "0").replace(/\s/g, "").replace(",", ".");
    return { id: Date.now() + i, name: cols[nameIdx]?.trim() || "Unknown", value: parseFloat(rawVal) || 0, sector: "Other", stopPct: null };
  }).filter(h => h.value > 0);
}

const iStyle = { width: "100%", background: "#0d0d1a", border: "1px solid #333", borderRadius: 10, padding: "12px 14px", color: "#fff", fontFamily: "inherit", fontSize: 15, boxSizing: "border-box" };

function App() {
  const [holdings, setHoldings] = useState(() => loadHoldings() || INITIAL_HOLDINGS);

  useEffect(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify(holdings)); } catch(e) {}
  }, [holdings]);
  const [tab, setTab]           = useState("chart");
  const [showAdd, setShowAdd]   = useState(false);
  const [editId, setEditId]     = useState(null);
  const [newName, setNewName]   = useState("");
  const [newValue, setNewValue] = useState("");
  const [newSector, setNewSector] = useState(SECTOR_OPTIONS[0]);
  const [newStop, setNewStop]   = useState("");
  const [csvError, setCsvError] = useState("");
  const [activeSector, setActiveSector] = useState(null);
  const [viewMode, setViewMode] = useState("risk");
  const fileRef = useRef();

  const marketTotal = holdings.reduce((s, h) => s + h.value, 0);
  const riskTotal   = holdings.reduce((s, h) => s + effectiveValue(h), 0);
  const activeTotal = viewMode === "risk" ? riskTotal : marketTotal;
  const getValue    = (h) => viewMode === "risk" ? effectiveValue(h) : h.value;
  const hasStops    = holdings.some(h => h.stopPct != null);
  const protectedValue = marketTotal - riskTotal;

  const sectorData = Object.entries(
    holdings.reduce((acc, h) => { acc[h.sector] = (acc[h.sector] || 0) + getValue(h); return acc; }, {})
  ).map(([name, value]) => ({ name, value, pct: (value / activeTotal) * 100 }))
   .sort((a, b) => b.value - a.value);

  const metalTotal = sectorData.filter(s => METAL_SECTORS.includes(s.name)).reduce((s, d) => s + d.value, 0);
  const metalPct   = (metalTotal / activeTotal) * 100;

  const overweightHoldings = holdings.filter(h => (getValue(h) / activeTotal) * 100 > HOLDING_WARN_PCT);
  const overweightSectors  = sectorData.filter(d => d.pct > SECTOR_WARN_PCT);
  const totalWarnings = overweightHoldings.length + overweightSectors.length;

  function saveHolding() {
    if (!newName || !newValue) return;
    const entry = { name: newName, value: parseFloat(newValue), sector: newSector, stopPct: newStop !== "" ? parseFloat(newStop) : null };
    if (editId !== null) {
      setHoldings(h => h.map(x => x.id === editId ? { ...x, ...entry } : x));
      setEditId(null);
    } else {
      setHoldings(h => [...h, { id: Date.now(), ...entry }]);
    }
    setNewName(""); setNewValue(""); setNewSector(SECTOR_OPTIONS[0]); setNewStop(""); setShowAdd(false);
  }

  function startEdit(h) {
    setEditId(h.id); setNewName(h.name); setNewValue(String(h.value));
    setNewSector(h.sector); setNewStop(h.stopPct != null ? String(h.stopPct) : "");
    setShowAdd(true);
  }

  function handleCSV(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const result = parseCSV(ev.target.result);
      if (!result) { setCsvError("Could not find required columns (Namn, Marknadsvärde)."); return; }
      setCsvError(""); setHoldings(result);
    };
    reader.readAsText(file);
  }

  const filtered = activeSector ? holdings.filter(h => h.sector === activeSector) : holdings;

  const CustomTooltip = ({ active, payload }) => {
    if (!active || !payload?.length) return null;
    const d = payload[0].payload;
    return (
      <div style={{ background: "#1a1a2e", border: "1px solid #333", borderRadius: 10, padding: "10px 14px" }}>
        <div style={{ color: "#eee", fontWeight: 700 }}>{SECTOR_EMOJIS[d.name] || "📦"} {d.name}</div>
        <div style={{ color: SECTOR_COLORS[d.name] || "#999", fontSize: 13 }}>{d.pct.toFixed(1)}% — {d.value.toLocaleString("sv-SE", { maximumFractionDigits: 0 })} kr</div>
      </div>
    );
  };

  const ModePill = () => (
    <div style={{ display: "flex", background: "#1a1a2e", borderRadius: 20, padding: 3, gap: 2 }}>
      {[["risk","⚡ Risk","#ff4444"], ["market","📊 Market","#7B68EE"]].map(([m, label, col]) => (
        <button key={m} onClick={() => setViewMode(m)} style={{
          padding: "5px 13px", borderRadius: 16, border: "none", cursor: "pointer",
          background: viewMode === m ? col : "transparent",
          color: viewMode === m ? "#fff" : "#666", fontFamily: "inherit", fontSize: 12, fontWeight: viewMode === m ? 700 : 400,
        }}>{label}</button>
      ))}
    </div>
  );

  return (
    <div style={{ fontFamily: "'DM Sans', sans-serif", background: "#0d0d1a", minHeight: "100vh", color: "#e8e8f0", maxWidth: 480, margin: "0 auto", paddingBottom: 90 }}>

      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #1a1a35 0%, #0d0d1a 100%)", padding: "28px 20px 20px", borderBottom: "1px solid #222" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 4 }}>
          <div style={{ fontSize: 11, letterSpacing: 3, color: "#888", textTransform: "uppercase" }}>Portfolio Tracker</div>
          <ModePill />
        </div>
        <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 30, fontWeight: 700, color: "#fff", marginTop: 8 }}>
          {activeTotal.toLocaleString("sv-SE", { maximumFractionDigits: 0 })} <span style={{ fontSize: 15, color: "#888", fontWeight: 400 }}>SEK</span>
        </div>
        {hasStops && viewMode === "risk" && (
          <div style={{ fontSize: 12, color: "#5BA85B", marginTop: 3 }}>🛡 {protectedValue.toLocaleString("sv-SE", { maximumFractionDigits: 0 })} kr protected by stop limits</div>
        )}
        {hasStops && viewMode === "market" && (
          <div style={{ fontSize: 12, color: "#888", marginTop: 3 }}>Showing full market value · switch to ⚡ Risk for stop-adjusted view</div>
        )}
        <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
          {[["Holdings", holdings.length, "#fff"], ["Metals", metalPct.toFixed(1)+"%", "#FFD700"], ["Sectors", sectorData.length, "#fff"]].map(([label, val, color]) => (
            <div key={label} style={{ background: "#16213e", borderRadius: 10, padding: "8px 0", flex: 1, textAlign: "center" }}>
              <div style={{ fontSize: 11, color: "#888" }}>{label}</div>
              <div style={{ fontWeight: 700, fontSize: 17, color }}>{val}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", background: "#111", borderBottom: "1px solid #222" }}>
        {["chart","sectors","holdings","warnings"].map(t => (
          <button key={t} onClick={() => setTab(t)} style={{
            flex: 1, padding: "13px 0", background: "none", border: "none",
            color: tab === t ? "#fff" : "#666", fontFamily: "inherit", fontSize: 11,
            fontWeight: tab === t ? 700 : 400, cursor: "pointer",
            borderBottom: tab === t ? `2px solid ${t === "warnings" ? "#ff4444" : "#7B68EE"}` : "2px solid transparent",
            textTransform: "capitalize", letterSpacing: 0.5,
          }}>
            {t === "warnings" && totalWarnings > 0
              ? React.createElement("span", null, "⚠️ ", React.createElement("span", { style: { background: "#ff4444", color: "#fff", borderRadius: "50%", fontSize: 10, padding: "1px 5px", marginLeft: 2 } }, totalWarnings))
              : t}
          </button>
        ))}
      </div>

      {/* CHART */}
      {tab === "chart" && (
        <div style={{ padding: "20px 16px" }}>
          <ResponsiveContainer width="100%" height={230}>
            <PieChart>
              <Pie data={sectorData} cx="50%" cy="50%" innerRadius={62} outerRadius={100} paddingAngle={2} dataKey="value"
                onClick={d => setActiveSector(activeSector === d.name ? null : d.name)}>
                {sectorData.map(e => (
                  <Cell key={e.name} fill={SECTOR_COLORS[e.name] || "#999"}
                    opacity={activeSector && activeSector !== e.name ? 0.3 : 1} style={{ cursor: "pointer" }} />
                ))}
              </Pie>
              <Tooltip content={<CustomTooltip />} />
            </PieChart>
          </ResponsiveContainer>
          <div style={{ textAlign: "center", marginTop: -8, marginBottom: 14, fontSize: 12, color: "#555" }}>Click a slice to filter</div>
          {sectorData.map(d => {
            const isOver = d.pct > SECTOR_WARN_PCT;
            return (
              <div key={d.name} onClick={() => setActiveSector(activeSector === d.name ? null : d.name)}
                style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 14px", marginBottom: 6, borderRadius: 12, cursor: "pointer",
                  background: isOver ? "#1f0a0a" : (activeSector === d.name ? "#1e1e3a" : "#131320"),
                  border: isOver ? "1px solid #ff4444" : (activeSector === d.name ? `1px solid ${SECTOR_COLORS[d.name]}` : "1px solid #1e1e2e"),
                  transition: "all 0.15s" }}>
                <div style={{ width: 10, height: 10, borderRadius: "50%", background: SECTOR_COLORS[d.name] || "#999", flexShrink: 0 }} />
                <div style={{ flex: 1, fontSize: 14 }}>{isOver && "⚠️ "}{SECTOR_EMOJIS[d.name] || "📦"} {d.name}</div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontWeight: 700, fontSize: 14, color: isOver ? "#ff4444" : (SECTOR_COLORS[d.name] || "#fff") }}>{d.pct.toFixed(1)}%</div>
                  <div style={{ fontSize: 11, color: "#666" }}>{d.value.toLocaleString("sv-SE", { maximumFractionDigits: 0 })} kr</div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* SECTORS */}
      {tab === "sectors" && (
        <div style={{ padding: "20px 16px" }}>
          <div style={{ fontSize: 12, color: "#666", marginBottom: 12 }}>Grouped by category · {viewMode === "risk" ? "⚡ risk-adjusted" : "📊 market value"}</div>
          <div style={{ background: "#1a1608", border: "1px solid #3a3000", borderRadius: 14, padding: 14, marginBottom: 12 }}>
            <div style={{ fontWeight: 700, color: "#FFD700", marginBottom: 10, fontSize: 13, letterSpacing: 1 }}>⚙️ METALS — {metalPct.toFixed(1)}%</div>
            {sectorData.filter(s => METAL_SECTORS.includes(s.name)).map(d => (
              <div key={d.name} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: "1px solid #2a2200" }}>
                <div style={{ fontSize: 14 }}>{SECTOR_EMOJIS[d.name]} {d.name}</div>
                <div style={{ fontWeight: 700, color: SECTOR_COLORS[d.name] }}>{d.pct.toFixed(1)}%</div>
              </div>
            ))}
          </div>
          {sectorData.filter(s => !METAL_SECTORS.includes(s.name)).map(d => {
            const isOver = d.pct > SECTOR_WARN_PCT;
            return (
              <div key={d.name} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", marginBottom: 6, borderRadius: 12,
                background: isOver ? "#1f0a0a" : "#131320", border: isOver ? "1px solid #ff4444" : "1px solid #1e1e2e" }}>
                <div style={{ width: 10, height: 10, borderRadius: "50%", background: SECTOR_COLORS[d.name] || "#999" }} />
                <div style={{ flex: 1, fontSize: 14 }}>{isOver && "⚠️ "}{SECTOR_EMOJIS[d.name] || "📦"} {d.name}</div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontWeight: 700, color: isOver ? "#ff4444" : (SECTOR_COLORS[d.name] || "#fff") }}>{d.pct.toFixed(1)}%</div>
                  <div style={{ fontSize: 11, color: "#666" }}>{d.value.toLocaleString("sv-SE", { maximumFractionDigits: 0 })} kr</div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* HOLDINGS */}
      {tab === "holdings" && (
        <div style={{ padding: "16px" }}>
          {activeSector && (
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, background: "#1e1e3a", borderRadius: 10, padding: "8px 14px" }}>
              <div style={{ fontSize: 13, color: "#aaa" }}>Filtered: <b style={{ color: "#fff" }}>{activeSector}</b></div>
              <button onClick={() => setActiveSector(null)} style={{ background: "none", border: "none", color: "#7B68EE", cursor: "pointer", fontSize: 13 }}>Clear ✕</button>
            </div>
          )}
          <div style={{ background: "#131320", border: "1px dashed #333", borderRadius: 12, padding: "12px 16px", marginBottom: 12, textAlign: "center" }}>
            <div style={{ fontSize: 13, color: "#666", marginBottom: 8 }}>Upload Avanza CSV to replace all holdings</div>
            <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
              <button onClick={() => fileRef.current.click()} style={{ background: "#1e1e3a", border: "1px solid #333", borderRadius: 8, color: "#7B68EE", padding: "8px 16px", cursor: "pointer", fontFamily: "inherit", fontSize: 13 }}>📂 CSV</button>
              <button onClick={() => { if(confirm("Reset to original holdings? This cannot be undone.")) { setHoldings(INITIAL_HOLDINGS); } }} style={{ background: "#1e1e3a", border: "1px solid #333", borderRadius: 8, color: "#888", padding: "8px 16px", cursor: "pointer", fontFamily: "inherit", fontSize: 13 }}>↺ Reset</button>
            </div>
            <input ref={fileRef} type="file" accept=".csv" style={{ display: "none" }} onChange={handleCSV} />
            {csvError && <div style={{ color: "#ff6b6b", fontSize: 12, marginTop: 8 }}>{csvError}</div>}
          </div>
          {filtered.map(h => {
            const val = getValue(h);
            const pct = (val / activeTotal) * 100;
            const isOver = pct > HOLDING_WARN_PCT;
            const hasStop = h.stopPct != null;
            const riskVal = effectiveValue(h);
            const safeVal = h.value - riskVal;
            return (
              <div key={h.id} style={{ padding: "12px 14px", marginBottom: 6, borderRadius: 12,
                background: isOver ? "#1f0a0a" : "#131320", border: isOver ? "1px solid #ff4444" : "1px solid #1e1e2e" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ width: 8, height: 8, borderRadius: "50%", background: SECTOR_COLORS[h.sector] || "#999", flexShrink: 0 }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {isOver && <span style={{ color: "#ff4444", marginRight: 4 }}>⚠️</span>}{h.name}
                    </div>
                    <div style={{ fontSize: 11, color: "#666" }}>{h.sector}</div>
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: isOver ? "#ff4444" : "#fff" }}>{pct.toFixed(1)}%</div>
                    <div style={{ fontSize: 11, color: "#666" }}>{val.toLocaleString("sv-SE", { maximumFractionDigits: 0 })} kr</div>
                  </div>
                  <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                    <button onClick={() => startEdit(h)} style={{ background: "#1e1e3a", border: "none", borderRadius: 6, color: "#7B68EE", padding: "5px 8px", cursor: "pointer", fontSize: 12 }}>✏️</button>
                    <button onClick={() => setHoldings(hh => hh.filter(x => x.id !== h.id))} style={{ background: "#2a1020", border: "none", borderRadius: 6, color: "#ff6b6b", padding: "5px 8px", cursor: "pointer", fontSize: 12 }}>🗑</button>
                  </div>
                </div>
                {hasStop && (
                  <div style={{ marginTop: 9 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, marginBottom: 4 }}>
                      <span style={{ color: "#ff6666" }}>🛑 {h.stopPct}% stop · risk: {riskVal.toLocaleString("sv-SE", { maximumFractionDigits: 0 })} kr</span>
                      <span style={{ color: "#5BA85B" }}>🛡 {safeVal.toLocaleString("sv-SE", { maximumFractionDigits: 0 })} kr protected</span>
                    </div>
                    <div style={{ background: "#1a1a2e", borderRadius: 4, height: 5, overflow: "hidden", display: "flex" }}>
                      <div style={{ width: `${h.stopPct}%`, background: "#ff4444" }} />
                      <div style={{ flex: 1, background: "#5BA85B" }} />
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* WARNINGS */}
      {tab === "warnings" && (
        <div style={{ padding: "20px 16px" }}>
          {totalWarnings === 0 ? (
            <div style={{ textAlign: "center", padding: "48px 0" }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}>✅</div>
              <div style={{ fontSize: 16, fontWeight: 700, color: "#5BA85B" }}>All within limits</div>
              <div style={{ fontSize: 13, marginTop: 6, color: "#555" }}>No holding &gt;{HOLDING_WARN_PCT}% or sector &gt;{SECTOR_WARN_PCT}%</div>
            </div>
          ) : (
            <div>
              <div style={{ background: "#1f0808", border: "1px solid #ff4444", borderRadius: 12, padding: "12px 16px", marginBottom: 20 }}>
                <div style={{ color: "#ff4444", fontWeight: 700, fontSize: 14, marginBottom: 4 }}>⚠️ {totalWarnings} concentration warning{totalWarnings > 1 ? "s" : ""}</div>
                <div style={{ color: "#aaa", fontSize: 12 }}>Limits: &gt;{HOLDING_WARN_PCT}% per holding · &gt;{SECTOR_WARN_PCT}% per sector</div>
              </div>
              {overweightHoldings.length > 0 && (
                <div>
                  <div style={{ fontSize: 11, letterSpacing: 2, color: "#888", textTransform: "uppercase", marginBottom: 10 }}>Overweight Holdings</div>
                  {[...overweightHoldings].sort((a, b) => getValue(b) - getValue(a)).map(h => {
                    const pct = (getValue(h) / activeTotal) * 100;
                    return (
                      <div key={h.id} style={{ background: "#1f0a0a", border: "1px solid #ff4444", borderRadius: 12, padding: "12px 16px", marginBottom: 8 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                          <div>
                            <div style={{ fontWeight: 700, fontSize: 14 }}>{h.name}</div>
                            <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>{h.sector}{h.stopPct != null ? ` · 🛑 ${h.stopPct}% stop` : " · no stop set"}</div>
                          </div>
                          <div style={{ textAlign: "right" }}>
                            <div style={{ color: "#ff4444", fontWeight: 700, fontSize: 16 }}>{pct.toFixed(1)}%</div>
                            <div style={{ fontSize: 11, color: "#ff7777" }}>+{(pct - HOLDING_WARN_PCT).toFixed(1)}% over limit</div>
                          </div>
                        </div>
                        <div style={{ marginTop: 10, background: "#2a0808", borderRadius: 6, height: 6, overflow: "hidden" }}>
                          <div style={{ height: "100%", width: `${Math.min(pct / 10 * 100, 100)}%`, background: "linear-gradient(90deg, #ff4444, #ff0000)", borderRadius: 6 }} />
                        </div>
                        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4, fontSize: 10, color: "#666" }}>
                          <span>0%</span><span style={{ color: "#ff8888" }}>limit {HOLDING_WARN_PCT}%</span><span>10%+</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              {overweightSectors.length > 0 && (
                <div style={{ marginTop: 16 }}>
                  <div style={{ fontSize: 11, letterSpacing: 2, color: "#888", textTransform: "uppercase", marginBottom: 10 }}>Overweight Sectors</div>
                  {[...overweightSectors].sort((a, b) => b.pct - a.pct).map(d => (
                    <div key={d.name} style={{ background: "#1f0a0a", border: "1px solid #ff4444", borderRadius: 12, padding: "12px 16px", marginBottom: 8 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div style={{ fontWeight: 700, fontSize: 14 }}>{SECTOR_EMOJIS[d.name] || "📦"} {d.name}</div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ color: "#ff4444", fontWeight: 700, fontSize: 16 }}>{d.pct.toFixed(1)}%</div>
                          <div style={{ fontSize: 11, color: "#ff7777" }}>+{(d.pct - SECTOR_WARN_PCT).toFixed(1)}% over limit</div>
                        </div>
                      </div>
                      <div style={{ marginTop: 10, background: "#2a0808", borderRadius: 6, height: 6, overflow: "hidden" }}>
                        <div style={{ height: "100%", width: `${Math.min(d.pct / 60 * 100, 100)}%`, background: "linear-gradient(90deg, #ff8800, #ff4444)", borderRadius: 6 }} />
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4, fontSize: 10, color: "#666" }}>
                        <span>0%</span><span style={{ color: "#ff8888" }}>limit {SECTOR_WARN_PCT}%</span><span>60%+</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* FAB */}
      {!showAdd && (
        <button onClick={() => { setShowAdd(true); setEditId(null); setNewName(""); setNewValue(""); setNewSector(SECTOR_OPTIONS[0]); setNewStop(""); }}
          style={{ position: "fixed", bottom: 24, right: 24, width: 56, height: 56, borderRadius: "50%", background: "linear-gradient(135deg, #7B68EE, #4A90D9)", border: "none", color: "#fff", fontSize: 26, cursor: "pointer", boxShadow: "0 4px 20px rgba(123,104,238,0.5)", zIndex: 100 }}>
          +
        </button>
      )}

      {/* Modal */}
      {showAdd && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 200, display: "flex", alignItems: "flex-end" }}>
          <div style={{ background: "#1a1a2e", borderRadius: "20px 20px 0 0", padding: "24px 20px 36px", width: "100%", boxSizing: "border-box" }}>
            <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 18, marginBottom: 20 }}>
              {editId !== null ? "Edit Holding" : "Add Holding"}
            </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 12, color: "#888", marginBottom: 6 }}>Name</div>
              <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="e.g. Bitcoin ETF" style={iStyle} />
            </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 12, color: "#888", marginBottom: 6 }}>Market Value (SEK)</div>
              <input value={newValue} onChange={e => setNewValue(e.target.value)} placeholder="e.g. 5000" type="number" style={iStyle} />
            </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 12, color: "#888", marginBottom: 6 }}>Sector</div>
              <select value={newSector} onChange={e => setNewSector(e.target.value)} style={iStyle}>
                {SECTOR_OPTIONS.map(s => <option key={s} value={s}>{SECTOR_EMOJIS[s]} {s}</option>)}
              </select>
            </div>
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 12, color: "#888", marginBottom: 6 }}>
                🛑 Stop Limit — % of position at <b style={{ color: "#ff6666" }}>risk</b> <span style={{ color: "#555" }}>(optional)</span>
              </div>
              <input value={newStop} onChange={e => setNewStop(e.target.value)} placeholder="e.g. 10 = only 10% is at risk" type="number" min="0" max="100" style={iStyle} />
              {newStop !== "" && newValue !== "" && !isNaN(parseFloat(newStop)) && !isNaN(parseFloat(newValue)) && (
                <div style={{ marginTop: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 6 }}>
                    <span style={{ color: "#ff6666" }}>⚡ At risk: {(parseFloat(newValue) * parseFloat(newStop) / 100).toLocaleString("sv-SE", { maximumFractionDigits: 0 })} kr</span>
                    <span style={{ color: "#5BA85B" }}>🛡 Protected: {(parseFloat(newValue) * (1 - parseFloat(newStop) / 100)).toLocaleString("sv-SE", { maximumFractionDigits: 0 })} kr</span>
                  </div>
                  <div style={{ background: "#1a1a2e", borderRadius: 4, height: 6, overflow: "hidden", display: "flex" }}>
                    <div style={{ width: `${Math.min(parseFloat(newStop), 100)}%`, background: "#ff4444" }} />
                    <div style={{ flex: 1, background: "#5BA85B" }} />
                  </div>
                </div>
              )}
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => { setShowAdd(false); setEditId(null); }}
                style={{ flex: 1, padding: 14, background: "#111", border: "1px solid #333", borderRadius: 12, color: "#888", fontFamily: "inherit", fontSize: 15, cursor: "pointer" }}>
                Cancel
              </button>
              <button onClick={saveHolding}
                style={{ flex: 2, padding: 14, background: "linear-gradient(135deg, #7B68EE, #4A90D9)", border: "none", borderRadius: 12, color: "#fff", fontFamily: "inherit", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
                {editId !== null ? "Save Changes" : "Add Holding"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
